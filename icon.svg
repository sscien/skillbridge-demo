<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3cbfa9"/>
      <stop offset="0.55" stop-color="#5a6cf0"/>
      <stop offset="1" stop-color="#8b7cf6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b0801f"/>
      <stop offset="1" stop-color="#f0c979"/>
    </linearGradient>
  </defs>
  <!-- vault-dark rounded tile -->
  <rect width="512" height="512" rx="112" fill="#0d1211"/>
  <rect x="10" y="10" width="492" height="492" rx="102" fill="none" stroke="rgba(214,227,222,0.14)" stroke-width="4"/>
  <!-- the bridge arc: two worlds joined over the wall -->
  <path d="M96 332 Q256 128 416 332" fill="none" stroke="url(#arc)" stroke-width="40" stroke-linecap="round"/>
  <!-- the wall: redaction bar between the two sides -->
  <rect x="196" y="356" width="120" height="34" rx="8" fill="url(#gold)"/>
  <!-- pillars -->
  <circle cx="96" cy="352" r="26" fill="#d9a441"/>
  <circle cx="416" cy="352" r="26" fill="#4fb6e0"/>
</svg>
