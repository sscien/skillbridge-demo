at to do.\"]},{\"icon\":\"📦\",\"label\":\"Review queue\",\"blurb\":\"Talent submit work to the vault; you approve what enters the catalog.\",\"steps\":[\"Open an item to see the work, the talent-suggested price, and an automatic quality read.\",\"A duplicate or possible-stolen-work flag appears at the top if the intake screen caught a match. Investigate before approving.\",\"Set a fair valuation and approve, or send it back with a note. Your valuation is logged for calibration.\"]},{\"icon\":\"🛡\",\"label\":\"Vetting\",\"steps\":[\"Clients must be vetted before they can post needs. Open a pending client to see what they submitted.\",\"Approve to let them in, or decline with a reason. Both outcomes are recorded and the client is notified with wall-safe language.\"]},{\"icon\":\"⚖\",\"label\":\"Matching\",\"blurb\":\"Turn an approved need into a shortlist, by hand.\",\"steps\":[\"Open a need awaiting match. The system suggests talent whose skills fit.\",\"Pick who to put forward. The cap ladder shows how many active engagements each talent already has, so you do not overload anyone.\",\"Confirm the match to move it to the proposal step.\"]},{\"icon\":\"📄\",\"label\":\"Proposals\",\"blurb\":\"Compose the anonymized offer the client sees.\",\"steps\":[\"Open a pending match and write the proposal. The wall co-pilot rewrites anything that would reveal identity before you send.\",\"Set the price and license type. Send it; the client reviews it without ever seeing the talent name.\"]},{\"icon\":\"🗃\",\"label\":\"Shelf\",\"steps\":[\"Browse the whole approved catalog of vault work available to license.\",\"Use it to answer a client need quickly with an item that already exists.\"]},{\"icon\":\"🎖\",\"label\":\"Assessments\",\"steps\":[\"Review skill assessments talent have taken. Each shows the rubric and the score.\",\"A talent who fails may retake only after a cooldown (14 days, then 30). The countdown is shown so you can explain it.\"]},{\"icon\":\"✅\",\"label\":\"QA \u0026 delivery\",\"blurb\":\"The quality gate before a client receives work.\",\"steps\":[\"Open a delivery. A per-category checklist appears; every box must be resolved before the work can ship.\",\"Approve to deliver, or return it with specific fixes. The guarantee and dispute paths start here if something is wrong later.\"]},{\"icon\":\"💸\",\"label\":\"Payouts\",\"steps\":[\"Release escrow to talent once a milestone is accepted.\",\"Each release records the amount and reason and notifies the talent. A rung change on their ladder is flagged.\"]},{\"icon\":\"♻️\",\"label\":\"Renewals\",\"steps\":[\"Time-bound licenses expire. This queue shows what is coming up for renewal so you can offer it before it lapses.\"]},{\"icon\":\"✉\",\"label\":\"Messages\",\"blurb\":\"The relay. Every word between the two sides passes through here.\",\"steps\":[\"Read a party message, then relay it. The co-pilot strips identity leaks and can translate before you approve.\",\"Nothing is sent automatically; a human always approves what crosses the wall.\"]},{\"icon\":\"📜\",\"label\":\"Audit log\",\"steps\":[\"The permanent record of sensitive actions. Search it when you need to explain who did what and when.\"]},{\"icon\":\"📮\",\"label\":\"Waitlist\",\"steps\":[\"See who signed up on the landing page, by side (talent or client).\",\"This reads from the live database. Use it to plan who to onboard next.\"]},{\"icon\":\"⚙\",\"label\":\"Settings (your own profile)\",\"blurb\":\"This is where you change your own display name.\",\"steps\":[\"Open Settings from the bottom of the sidebar.\",\"Edit your full name, bio, or location and click save. The change is verified as yours and saved to your own record only.\",\"You cannot make yourself more or less privileged here; staff status is set through a separate secure path on purpose.\"]}],\"footer\":\"This guide lives inside the product, so it never goes out of date. Any staff member you add sees the same page.\"}}],null,\"$Lb\"]}],{},null,false]},nul
